version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mini-inventario-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventario
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: mini-inventario-api
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: inventario
      PORT: 3000
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mini-inventario-api.rule=Host(`inventario.dokploy.local`)"
      - "traefik.http.routers.mini-inventario-api.entrypoints=web,websecure"
      - "traefik.http.services.mini-inventario-api.loadbalancer.server.port=3000"

volumes:
  mysql_data:

networks:
  default:
    name: dokploy-network
    external: false
